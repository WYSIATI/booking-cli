version: 2

updates:
  # npm dependencies for the CLI / MCP server.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    commit-message:
      # Conventional Commits: keep dependency bumps out of release notes noise.
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      # Batch low-risk minor/patch bumps into a single PR to reduce churn.
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows in this directory.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        update-types:
          - minor
          - patch
